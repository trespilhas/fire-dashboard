<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div id="app" class="theme-sunny">
    <div class="weather-bg" id="weatherBg"></div>

    <header>
      <h1 id="greeting"></h1>
      <p id="date"></p>
    </header>

    <section class="top-row">
      <div class="weather-card" id="weather">
        <div class="weather-icon" id="weatherIcon"></div>
        <div class="weather-info">
          <span class="weather-temp" id="weatherTemp">--°F</span>
          <span class="weather-desc" id="weatherDesc">Loading…</span>
          <span class="weather-detail" id="weatherDetail"></span>
        </div>
      </div>

      <div class="discussion-card" id="discussion">
        <div class="discussion-icon" id="discussionIcon"></div>
        <div class="discussion-info">
          <span class="discussion-title" id="discussionTitle">Loading…</span>
          <span class="discussion-body" id="discussionBody"></span>
          <a class="discussion-link" id="discussionLink" href="https://github.com/trespilhas/fire-dashboard/discussions"
            target="_blank" rel="noopener">View discussions →</a>
        </div>
      </div>
    </section>

    <section class="clocks">
      <div class="clock-card" id="clock-miami">
        <span class="clock-label">Miami</span>
        <span class="clock-time"></span>
      </div>
      <div class="clock-card" id="clock-sanfran">
        <span class="clock-label">San Francisco</span>
        <span class="clock-time"></span>
      </div>
      <div class="clock-card" id="clock-saopaulo">
        <span class="clock-label">São Paulo</span>
        <span class="clock-time"></span>
      </div>
    </section>
  </div>

  <script src="app.js"></script>
</body>

</html>
